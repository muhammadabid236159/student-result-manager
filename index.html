<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
    
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-4">Student Result Manager</h2>

    <div class="row g-4">

        <!-- FORM -->
        <div class="col-lg-4">
            <div class="card p-4 shadow-sm">

                <input type="text" id="studentName" class="form-control mb-2" placeholder="Student Name">
                <input type="text" id="rollNumber" class="form-control mb-2" placeholder="Roll Number">
                <input type="number" id="marks" class="form-control mb-3" placeholder="Marks">

                <button id="addBtn" class="btn btn-primary w-100">Add Result</button>

            </div>
        </div>

        <!-- STATS -->
        <div class="col-lg-8">
            <div class="row g-3">

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <h6>Total</h6>
                        <h3 id="totalStudents">0</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <h6>Pass</h6>
                        <h3 id="passStudents">0</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <h6>Fail</h6>
                        <h3 id="failStudents">0</h3>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card mt-4 p-3 shadow-sm">

        <div class="d-flex justify-content-between mb-3">
            <h4>Students</h4>
            <input type="text" class="form-control search-box" placeholder="Search...">
        </div>

        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Roll</th>
                    <th>Marks</th>
                    <th>Grade</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="studentData"></tbody>
        </table>

    </div>

</div>

<script src="index.js"></script>

</body>
</html>
